#this is technically not used in the workshop but included if you want to do dynamic provisioning
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: s3
provisioner: ch.ctrox.csi.s3-driver
parameters:
  mounter: s3fs
  bucket: my-argo-pipeline-storage
  region: us-east-1
  endpoint: s3.us-east-1.amazonaws.com
  secretName: csi-s3-secret
  secretNamespace: default
reclaimPolicy: Retain
volumeBindingMode: Immediate
