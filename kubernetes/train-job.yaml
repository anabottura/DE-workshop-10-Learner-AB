# This is an example of a non-argo job (stretch/extend activity only)
apiVersion: batch/v1
kind: Job
metadata:
  name: train-model
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: train-model
        image: <ECR_REPO_URI>:latest  # Replace <ECR_REPO_URI> with the actual ECR repository URI from CloudFormation outputs
        env:
        - name: S3_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: train-model-config
              key: S3_BUCKET_NAME
        - name: OUTPUT_KEY
          value: "output/attrition_predictions.csv"
      restartPolicy: Never
  backoffLimit: 2
