#For experimentation only
apiVersion: v1
kind: PersistentVolume
metadata:
  name: s3-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""          # Use empty for static binding
  csi:
    driver: ch.ctrox.csi.s3-driver
    volumeHandle: s3-pv
    volumeAttributes:
      bucket: "my-argo-pipeline-storage"
      region: "us-east-1"
      endpoint: "s3.us-east-1.amazonaws.com"
      mounter: "s3fs"
  persistentVolumeReclaimPolicy: Retain
